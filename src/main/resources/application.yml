spring:
  application:
    name: event-ledger

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/event_ledger}
    username: ${DB_USERNAME:event_ledger_user}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

event-ledger:
  batch-lock:
    ttl-seconds: ${BATCH_LOCK_TTL_SECONDS:30}
    acquire-timeout-millis: ${BATCH_LOCK_ACQUIRE_TIMEOUT_MS:5000}
  manifest-processing:
    max-retry-attempts: ${MANIFEST_MAX_RETRIES:3}
    retry-delay-millis: ${MANIFEST_RETRY_DELAY_MS:500}
  cleanup:
    expired-lock-cleanup-interval-seconds: ${CLEANUP_INTERVAL_SECONDS:300}
  idempotency:
    retention-days: ${IDEMPOTENCY_RETENTION_DAYS:30}
  transaction:
    timeout-seconds: ${TRANSACTION_TIMEOUT_SECONDS:30}
